name: Auto-cleanup old concepts

on:
  schedule:
    # Каждый день в 03:00 UTC (06:00 по Москве)
    - cron: "0 3 * * *"
  workflow_dispatch: # Можно запустить вручную из Actions UI

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Нужна полная история

      - name: Remove concept folders older than 30 days
        run: |
          set -e
          REMOVED=0
          # Перебираем папки в корне репо. Кандидат — каталог из 8 hex-символов (UUID-папка).
          for dir in */; do
            [ -d "$dir" ] || continue
            folder_name="${dir%/}"

            # Пропускаем системные/служебные папки
            case "$folder_name" in
              .github|.git|node_modules) continue ;;
            esac

            # Только UUID-папки (8 hex chars)
            if ! echo "$folder_name" | grep -qE '^[a-f0-9]{8}$'; then
              echo "Skipping non-UUID folder: $folder_name"
              continue
            fi

            # Дата первого коммита, добавившего файлы в этой папке
            first_commit_date=$(git log --diff-filter=A --format="%aI" -- "$dir" | tail -1)

            if [ -z "$first_commit_date" ]; then
              echo "Skipping $folder_name (no commit history found)"
              continue
            fi

            # Возраст в днях
            now_ts=$(date -u +%s)
            created_ts=$(date -u -d "$first_commit_date" +%s 2>/dev/null || echo 0)
            if [ "$created_ts" = "0" ]; then
              echo "Cannot parse date for $folder_name"
              continue
            fi
            age_days=$(( (now_ts - created_ts) / 86400 ))

            if [ "$age_days" -gt 30 ]; then
              echo "Removing $folder_name (age: $age_days days)"
              git rm -rf "$dir"
              REMOVED=$((REMOVED + 1))
            else
              echo "Keeping $folder_name (age: $age_days days)"
            fi
          done

          echo "REMOVED=$REMOVED" >> $GITHUB_ENV

      - name: Commit and push if anything was removed
        if: env.REMOVED != '0'
        run: |
          git config user.name "cf-concepts-bot"
          git config user.email "actions@github.com"
          git commit -m "chore: auto-cleanup ${REMOVED} concept folder(s) older than 30 days"
          git push
